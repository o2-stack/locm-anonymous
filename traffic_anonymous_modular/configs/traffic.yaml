seed: 5
max_steps: 96
round_episodes: [1000, 1000]
phase_episodes: 100
num_rounds: 2

traffic:
  n_agents: 3
  n_actions: 5
  green_split_init: 0.5
  green_split_min: 0.15
  green_split_max: 0.85
  max_queue: 80.0

sac:
  gamma: 0.99
  tau: 0.005
  lr_actor: 0.0003
  lr_critic: 0.0003
  lr_alpha: 0.0003
  batch_size: 256
  buffer_size: 500000
  warmup_steps: 5000
  updates_per_step: 1
  target_update_interval: 1
  alpha_init: 0.2
  auto_entropy: true

llm:
  model: gpt-4o-mini
  temperature: 0.4
  max_tokens: 2500
  fallback: rule_based
